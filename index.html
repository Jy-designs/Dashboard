<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFEF8;
    --ink:#111A29;
    --muted:#8A8A80;
    --line:#F0EFE6;
    --orange:#FF6000;
    --lime:#CBEA00;
    --green-ink:#0E9F6E;
    --green-line:#BDEBD4;
    --red-ink:#E8114B;
    --red-line:#F9C2CF;
    --chip:#F2F1E9;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);
    font-family:'Plus Jakarta Sans',-apple-system,'SF Pro Text',system-ui,sans-serif;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  /* ---------- phone frame ---------- */
  #phone{
    position:relative;
    width:100%;max-width:420px;height:100%;
    background:var(--bg);
    overflow:hidden;
  }
  @media (min-width:520px) and (min-height:900px){
    #phone{
      width:402px;height:874px;max-height:94vh;
      border-radius:48px;
      box-shadow:0 0 0 1px #ECEAE0, 0 30px 80px -20px rgba(17,26,41,.25);
    }
  }
  /* ---------- header ---------- */
  #header{
    position:absolute;top:0;left:0;right:0;z-index:30;
    padding:0 20px;
    background:var(--bg);
  }
  .statusbar{
    height:48px;display:flex;align-items:center;justify-content:space-between;
    font-weight:700;font-size:16px;letter-spacing:.2px;padding-top:6px;
  }
  .statusicons{display:flex;align-items:center;gap:6px}
  .namebar{
    height:56px;display:flex;align-items:center;justify-content:center;position:relative;
  }
  .namebar h1{font-size:18px;font-weight:800;letter-spacing:-.1px}
  .avatar{position:absolute;right:-8px;top:2px;width:56px;height:56px}
  .avatar svg{width:100%;height:100%;display:block}
  /* ---------- behind content ---------- */
  #behind{
    position:absolute;left:0;right:0;top:104px;bottom:0;
    padding:8px 16px 0;
    transform-origin:top center;
    will-change:transform,opacity;
  }
  .balance{width:100%;margin-bottom:18px}
  .balance svg{width:100%;height:auto;display:block}
  .actions{
    display:flex;justify-content:space-between;padding:0 4px;
  }
  .actions .btn{width:21%;max-width:76px;cursor:pointer;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
  .actions .btn:active{transform:scale(.92)}
  .actions svg{width:100%;height:auto;display:block}
  /* ---------- overlay sheet ---------- */
  #sheet{
    position:absolute;left:0;right:0;z-index:35;
    top:0;height:calc(100% - 54px);
    background:#FFFEF8;
    border-radius:32px 32px 0 0;
    box-shadow:0 -113px 32px 0 rgba(215,213,203,0.00),
               0 -72px 29px 0 rgba(215,213,203,0.01),
               0 -41px 24px 0 rgba(215,213,203,0.04),
               0 -18px 18px 0 rgba(215,213,203,0.07),
               0 -5px 10px 0 rgba(215,213,203,0.08);
    display:flex;flex-direction:column;
    will-change:transform;
    touch-action:none;
  }
  #sheet.animate{transition:transform .55s cubic-bezier(.32,.72,0,1)}
  .grabber{
    padding:10px 0 2px;display:flex;justify-content:center;flex-shrink:0;cursor:grab;
  }
  .grabber span{width:44px;height:5px;border-radius:3px;background:#E4E3DA}
  .tabs{
    display:flex;align-items:center;gap:8px;
    padding:10px 4px 14px;
  }
  .tab{
    font-size:15px;font-weight:700;color:#A9A89E;
    padding:8px 14px;border-radius:12px;cursor:pointer;border:none;background:transparent;
    font-family:inherit;transition:color .2s,background .2s;
  }
  .tab.active{color:var(--ink);background:var(--chip)}
  /* search — revealed in sync with sheet progress, scrolls with content */
  #searchWrap{
    overflow:hidden;
    height:0;opacity:0;
    will-change:height,opacity,transform;
  }
  #searchWrap .searchInner{padding-bottom:16px} /* 1rem gap to the chips */
  #searchWrap svg{width:100%;height:auto;display:block}
  .chips{padding:0 0 16px}
  .chips svg{width:100%;height:auto;display:block}
  /* list — the single scroll container: tabs, search & chips scroll with it */
  #list{
    flex:1;overflow-y:auto;overscroll-behavior:contain;
    padding:0 16px 120px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  #list::-webkit-scrollbar{display:none}
  .coincard{
    background:#FFFEF8;border:1px solid var(--line);border-radius:18px;
    overflow:hidden;
  }
  /* --- tab panels --- */
  #panes{will-change:transform,opacity}
  #list{user-select:none;-webkit-user-select:none}
  #investPanel,#txPanel{display:none}
  #investPanel{padding-top:6px}
  #list.tab-1 #searchWrap,#list.tab-1 .chips,#list.tab-1 .coincard{display:none}
  #list.tab-2 #searchWrap,#list.tab-2 .chips,#list.tab-2 .coincard{display:none}
  #list.tab-1 #investPanel{display:block}
  #list.tab-2 #txPanel{display:block}
  .strategy{
    background:#FFFEF8;border:1px solid var(--line);border-radius:20px;
    padding:20px 16px;display:flex;align-items:center;gap:10px;
    margin-bottom:18px;cursor:pointer;transition:background .15s;
  }
  .strategy:active{background:#FAFAF3}
  .strategy .sbody{flex:1;min-width:0}
  .strategy .stitle{
    display:flex;align-items:center;gap:10px;
    font-size:15px;font-weight:600;letter-spacing:-.1px;margin-bottom:8px;
  }
  .strategy .stitle svg{width:22px;height:22px}
  .strategy p{font-size:14px;line-height:1.4;font-weight:400;color:#2A3242}
  .strategy .chev{flex-shrink:0;color:#B7B6AC}
  .empty{
    padding:48px 0;text-align:center;color:#A9A89E;font-weight:600;font-size:15px;
  }
  .row{
    display:flex;align-items:center;gap:12px;
    padding:14px 16px;position:relative;cursor:pointer;
    transition:background .15s;
  }
  .row:active{background:#FAFAF3}
  .row + .row::before{
    content:"";position:absolute;top:0;left:16px;right:16px;height:1px;background:var(--line);
  }
  .cicon{width:40px;height:40px;flex-shrink:0}
  .cicon svg{width:100%;height:100%;display:block}
  .cinfo{flex:0 0 auto;min-width:90px;display:flex;flex-direction:column;gap:5px}
  .cname{font-size:15px;font-weight:800;letter-spacing:-.1px}
  .pill{
    align-self:flex-start;
    font-size:11.5px;font-weight:800;letter-spacing:.1px;
    padding:3px 9px;border-radius:999px;border:1.5px solid;
  }
  .pill.up{color:var(--ink);border-color:var(--green-line);background:#FFFEF8}
  .pill.down{color:var(--ink);border-color:var(--red-line);background:#FFFEF8}
  .cprice{font-size:16px;font-weight:800;letter-spacing:-.2px;margin-left:auto}
  /* sparkline graphs — draw in left-to-right on app start */
  .spark{
    width:22%;max-width:82px;min-width:48px;flex-shrink:1;
    margin-left:0;margin-right:10px;
    opacity:0;
    clip-path:inset(0 100% 0 0);
    animation:spark-in 1s cubic-bezier(.3,.7,.2,1) forwards;
    will-change:clip-path,opacity;
  }
  .spark svg{width:100%;height:auto;display:block}
  @keyframes spark-in{
    from{opacity:0;clip-path:inset(0 100% 0 0)}
    25%{opacity:1}
    to{opacity:1;clip-path:inset(0 -3% 0 0)}
  }
  .spark.drawn{animation:none;opacity:1;clip-path:none}
  @media (prefers-reduced-motion:reduce){
    .spark{animation:none;opacity:1;clip-path:none}
  }
  /* ---------- bottom nav ---------- */
  #nav{
    position:absolute;left:50%;transform:translateX(-50%);
    bottom:calc(18px + env(safe-area-inset-bottom,0px));z-index:40;
    background:#FFFEF8;border-radius:999px;
    box-shadow:0 8px 28px -6px rgba(17,26,41,.18), 0 0 0 1px rgba(17,26,41,.04);
    display:flex;align-items:center;gap:4px;
    padding:8px;
  }
  .navitem{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;border:none;background:transparent;cursor:pointer;
    border-radius:999px;padding:8px 16px;font-family:inherit;
    color:#9C9B91;transition:background .2s;
  }
  .navitem svg{width:24px;height:24px}
  .navitem .lbl{
    font-size:11px;font-weight:700;color:inherit;
    max-height:14px;opacity:1;overflow:hidden;
    transition:none;
  }
  .navitem.active{background:#FFF0E6;color:var(--orange)}
  /* load-in choreography */
  #behind,#header,#nav{opacity:0;transition:opacity .5s ease .1s}
  body.ready #behind,body.ready #header,body.ready #nav{opacity:1}
  @media (prefers-reduced-motion:reduce){
    #sheet.animate{transition:none}
    *{transition:none!important}
  }
</style>
</head>

document.getElementById('coins').innerHTML = coins.map((c,i)=>{
  const up = c.chg >= 0;
  const sign = up ? '+' : '-';
  return `<div class="row">
    <div class="cicon">${coinIcon[c.icon]}</div>
    <div class="cinfo">
      <span class="cname">${c.name}</span>
      <span class="pill ${up?'up':'down'}">${sign}&hairsp;${Math.abs(c.chg).toFixed(2)}%</span>
    </div>
    <div class="spark" style="animation-delay:${240 + i*90}ms">${up?GRAPH_POS:GRAPH_NEG}</div>
    <span class="cprice">${c.price}</span>
  </div>`;
}).join('');
/* the sparkline draw-in runs once, on launch only */
document.querySelectorAll('.spark').forEach(sp =>
  sp.addEventListener('animationend', () => sp.classList.add('drawn'), { once:true }));

/* ---------------- sheet physics ---------------- */
const sheet  = document.getElementById('sheet');
const behind = document.getElementById('behind');
const list   = document.getElementById('list');
const search = document.getElementById('searchWrap');
const navEl  = document.getElementById('nav');
const lbls   = navEl.querySelectorAll('.lbl');
const navItems = navEl.querySelectorAll('.navitem');
const phone  = document.getElementById('phone');

let searchH = 76;             // px the search field occupies fully revealed (measured)
let range = 0;                // px between peek and expanded positions
let peekTop = 0;              // sheet's resting top edge
let expandedTop = 54;         // expanded: just under the status bar — covers name + avatar
let p = 0;                    // 0 = peek, 1 = expanded

function measure(){
  const h = phone.clientHeight;
  const w = phone.clientWidth;
  /* peek position derived from the real content: 1rem below Buy/Sell/Swap/Earn */
  const contentW = w - 32;                       // #behind side padding
  const balanceH = contentW * 176 / 343;         // balance card aspect
  const btnW = Math.min((contentW - 8) * 0.21, 76);
  const btnH = btnW * 80 / 76;                   // button svg aspect (label baked in)
  const actionsBottom = 104 + 8 + balanceH + 18 + btnH;
  peekTop = Math.min(actionsBottom + 16, h - 150);
  range = peekTop - expandedTop;
  const fieldW = w - 32;                          // #list side padding
  searchH = Math.round(fieldW * 56 / 343) + 16;   // field aspect + 1rem gap below
  apply(p, false);
}
const clamp = v => Math.max(0, Math.min(1, v));
const ease  = t => t*t*(3-2*t);

function apply(prog, animate){
  p = clamp(prog);
  sheet.classList.toggle('animate', !!animate);
  sheet.style.transform = `translateY(${expandedTop + (1-p)*range}px)`;

  /* search field reveals in sync with the drag — Revolut style */
  const r = ease(clamp((p - 0.08) / 0.72));
  search.style.height    = (r * searchH) + 'px';
  search.style.opacity   = r;
  search.style.transform = `translateY(${(1-r)*-14}px) scale(${0.94 + r*0.06})`;

  /* content behind recedes with depth, Apple sheet style */
  const e = ease(p);
  behind.style.transform = `translateY(${e*-10}px) scale(${1 - e*0.06})`;
  behind.style.opacity   = 1 - e*0.6;
  behind.style.filter    = e > 0.02 ? `blur(${e*2}px)` : 'none';

  /* nav tucks its labels away and narrows as the sheet expands */
  lbls.forEach(l=>{
    l.style.maxHeight = ((1-e)*14) + 'px';
    l.style.opacity   = 1 - e;
    l.style.marginTop = (e*-2) + 'px';
  });
  navItems.forEach(n=>{ n.style.padding = `8px ${16 - 7*e}px`; });
  navEl.style.gap = (4 - 2*e) + 'px';

  list.style.overflowY = p >= 0.999 ? 'auto' : 'hidden';
}

/* drag / scroll interception — axis-locked: vertical = sheet, horizontal = tabs */
let startY = 0, startX = 0, startP = 0, dragging = false, moved = false, axis = null;

function panPanes(dx){
  const cur = curTab;
  const atEdge = (dx > 0 && cur === 0) || (dx < 0 && cur === TABS - 1);
  const x = dx * (atEdge ? 0.22 : 0.5);
  panes.style.transition = 'none';
  panes.style.transform  = `translateX(${x}px)`;
  panes.style.opacity    = 1 - Math.min(Math.abs(x) / 320, .35);
}
function releasePanes(dx){
  const dir = dx < 0 ? 1 : -1;                    // swipe left -> next tab
  const target = curTab + dir;
  if (Math.abs(dx) > 60 && target >= 0 && target < TABS){
    selectTab(target, dir);
  } else {
    panes.style.transition = 'transform .28s cubic-bezier(.2,.8,.2,1), opacity .28s';
    panes.style.transform  = 'translateX(0)';
    panes.style.opacity    = 1;
  }
}

sheet.addEventListener('touchstart', e => {
  startY = e.touches[0].clientY;
  startX = e.touches[0].clientX;
  startP = p; dragging = true; moved = false; axis = null;
  sheet.classList.remove('animate');
}, {passive:true});

sheet.addEventListener('touchmove', e => {
  if(!dragging) return;
  const t  = e.touches[0];
  const dx = t.clientX - startX;
  const dy = startY - t.clientY;                 // + up
  if(axis === null && (Math.abs(dx) > 8 || Math.abs(dy) > 8)){
    axis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
  }
  if(axis === 'h'){
    e.preventDefault();
    panPanes(dx);
    return;
  }
  if(axis !== 'v') return;
  const expanding  = dy > 0 && p < 1;
  const collapsing = dy < 0 && p > 0 && list.scrollTop <= 0;
  if(expanding || collapsing || (moved && p < 1)){
    moved = true;
    e.preventDefault();
    apply(startP + dy / range, false);
  }
}, {passive:false});

sheet.addEventListener('touchend', e => {
  if(!dragging) return;
  dragging = false;
  if(axis === 'h'){
    releasePanes(e.changedTouches[0].clientX - startX);
    return;
  }
  if(moved) apply(p > startP ? (p - startP > .12 ? 1 : 0) : (startP - p > .12 ? 0 : 1), true);
});

/* mouse swipe (desktop preview) */
list.addEventListener('mousedown', e => {
  if(e.target.closest('.tab')) return;
  let mAxis = null; const mx = e.clientX, my = e.clientY; let lastDx = 0;
  const mv = ev => {
    const dx = ev.clientX - mx, dy = ev.clientY - my;
    if(mAxis === null && (Math.abs(dx) > 8 || Math.abs(dy) > 8))
      mAxis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
    if(mAxis === 'h'){ lastDx = dx; panPanes(dx); ev.preventDefault(); }
  };
  const up = () => {
    removeEventListener('mousemove', mv); removeEventListener('mouseup', up);
    if(mAxis === 'h') releasePanes(lastDx);
  };
  addEventListener('mousemove', mv); addEventListener('mouseup', up);
});

let wheelTimer = null;
sheet.addEventListener('wheel', e => {
  const expanding  = e.deltaY > 0 && p < 1;
  const collapsing = e.deltaY < 0 && p > 0 && list.scrollTop <= 0;
  if(expanding || collapsing){
    e.preventDefault();
    sheet.classList.remove('animate');
    apply(p + e.deltaY / range, false);
    clearTimeout(wheelTimer);
    wheelTimer = setTimeout(()=> apply(p > 0.5 ? 1 : 0, true), 120);
  }
}, {passive:false});

/* grabber click toggles */
sheet.querySelector('.grabber').addEventListener('click', ()=> apply(p > .5 ? 0 : 1, true));

/* tabs: shared selection with directional slide */
const panes = document.getElementById('panes');
const tabEls = document.querySelectorAll('.tab');
const TABS = tabEls.length;
let curTab = 0, sliding = false;

function selectTab(i, dir){
  if(i === curTab || i < 0 || i >= TABS || sliding) {
    panes.style.transition='transform .28s cubic-bezier(.2,.8,.2,1), opacity .28s';
    panes.style.transform='translateX(0)'; panes.style.opacity=1;
    return;
  }
  dir = dir || (i > curTab ? 1 : -1);
  curTab = i;
  tabEls.forEach((x,j)=>x.classList.toggle('active', j===i));
  sliding = true;
  /* slide out, swap content, slide in from the other side */
  panes.style.transition = 'transform .15s ease-in, opacity .15s ease-in';
  panes.style.transform  = `translateX(${-dir*56}px)`;
  panes.style.opacity    = 0;
  setTimeout(()=>{
    list.classList.remove('tab-0','tab-1','tab-2');
    list.classList.add('tab-'+i);
    list.scrollTop = 0;
    panes.style.transition = 'none';
    panes.style.transform  = `translateX(${dir*56}px)`;
    void panes.offsetWidth;
    panes.style.transition = 'transform .26s cubic-bezier(.2,.8,.2,1), opacity .26s';
    panes.style.transform  = 'translateX(0)';
    panes.style.opacity    = 1;
    setTimeout(()=>{ sliding = false; }, 270);
  }, 150);
}
tabEls.forEach((t,i)=>t.addEventListener('click', ()=>selectTab(i)));
document.querySelectorAll('.navitem').forEach(n => n.addEventListener('click', () => {
  document.querySelectorAll('.navitem').forEach(x=>x.classList.remove('active'));
  n.classList.add('active');
}));

/* ---------------- load-in: sheet rises a little ---------------- */
window.addEventListener('resize', measure);
measure();
sheet.style.transform = `translateY(${peekTop + 90}px)`;   // start just below peek
requestAnimationFrame(()=> requestAnimationFrame(()=>{
  document.body.classList.add('ready');
  apply(0, true);                                        // settle up into peek
}));
</script>
</body>
</html>
